# /etc/nginx/sites-available/onk.temten.me
# HTTP API NestJS: localhost:3002
# TCP multiplayer is configured separately in deploy/nginx/stream.conf.

server {
    listen 80;
    listen [::]:80;
    server_name onk.temten.me;

    # Required by Certbot for initial and renewal certificate validation.
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/gamejam/food-gamejam-backend/public;
    }

    location / {
        return 301 https://onk.temten.me$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name onk.temten.me;

    ssl_certificate /etc/letsencrypt/live/onk.temten.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/onk.temten.me/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 60s;
    }
}
