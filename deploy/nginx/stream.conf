# Add this line in the top-level /etc/nginx/nginx.conf, outside `http { ... }`:
# include /etc/nginx/stream-conf.d/*.conf;
#
# Then install this file as /etc/nginx/stream-conf.d/temten.me.conf.
# This is raw TCP passthrough: do not add `ssl` here unless the Godot client is
# explicitly changed to establish a TLS TCP connection.

stream {
    upstream food_gamejam_tcp {
        # Start NestJS with TCP_HOST=127.0.0.1 and TCP_PORT=7778.
        # Nginx owns the public port 7777 used by the Godot client.
        server 127.0.0.1:7778;
    }

    server {
        listen 7777;
        proxy_connect_timeout 5s;
        proxy_timeout 1h;
        proxy_pass food_gamejam_tcp;
    }
}
